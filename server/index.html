<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Socket.IO chat</title>
    <style>
      body {
        margin: 0;
        padding-bottom: 3rem;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
      }

      #form {
        background: rgba(0, 0, 0, 0.15);
        padding: 0.25rem;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        display: flex;
        height: 3rem;
        box-sizing: border-box;
        backdrop-filter: blur(10px);
      }
      #input {
        border: none;
        padding: 0 1rem;
        flex-grow: 1;
        border-radius: 2rem;
        margin: 0.25rem;
      }
      #input:focus {
        outline: none;
      }
      button {
        background: #333;
        border: none;
        padding: 0 1rem;
        margin: 0.25rem;
        border-radius: 3px;
        outline: none;
        color: #fff;
      }

      #join {
        padding: 5px 10px;
      }

      #room {
        text-align: center;
      }

      #messages {
        list-style-type: none;
        margin: 0;
        padding: 0;
      }
      #messages > li {
        padding: 0.5rem 1rem;
      }
      #messages > li:nth-child(odd) {
        background: #efefef;
      }
    </style>
  </head>
  <body>
    <p id="room">Room: None</p>
    <ul id="messages"></ul>
    <form id="form" action="">
      <input id="input" autocomplete="off" /><button>Send</button>
    </form>
    <input id="room-input" autocomplete="off" />
    <button id="join">Join</button>
  </body>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const roomInput = document.getElementById("room-input");
    const messages = document.getElementById("messages");
    const joinButton = document.getElementById("join");
    const renderMessage = (message) => {
      const { content, createdAt } = message;
      const item = document.createElement("li");
      const time = new Date(createdAt).toLocaleTimeString();
      item.textContent = `${content} ${time}`;
      messages.appendChild(item);
    };

    socket.on("chat_message", (message) => {
      renderMessage(message);
      window.scrollTo(0, document.body.scrollHeight);
    });

    joinButton.addEventListener("click", () => {
      socket.emit("join_room", roomInput.value, ({ room, history }) => {
        if (room) {
          document.getElementById("room").textContent = `Room: ${room}`;
          messages.innerHTML = "";
          roomInput.value = "";
          for (const message of history) {
            renderMessage(message);
          }
        }
      });
    });

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      if (input.value) {
        socket.emit("chat_message", input.value, ({ ok }) => {
          if (!ok) {
            alert("Message wasn't sent");
          } else {
            input.value = "";
          }
        });
      }
    });
  </script>
</html>
